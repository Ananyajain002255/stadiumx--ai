<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analytics Dashboard</title>

<link rel="stylesheet" href="css/analytics.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<h1>📊 StadiumX AI Analytics</h1>

<p>Real-Time Dashboard</p>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>Total Tickets</h2>
<h1 id="ticketCount">0</h1>
</div>

<div class="card">
<h2>Total Revenue</h2>
<h1>₹<span id="revenue">0</span></h1>
</div>

<div class="card">
<h2>Total Tournaments</h2>
<h1 id="tournamentCount">0</h1>
</div>

<div class="card">
<h2>Total Teams</h2>
<h1 id="teamCount">0</h1>
</div>

</div>

</div>

<script src="js/analytics.js"></script>

</body>
</html>
